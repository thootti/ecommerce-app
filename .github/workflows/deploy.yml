deploy-api:
    name: Deploy API → EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build API
        run: |
          cd apps/api
          npm install
          npm run build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost/fake"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /home/ec2-user/app || mkdir -p /home/ec2-user/app
            aws s3 sync s3://${{ secrets.DEPLOY_BUCKET }}/app /home/ec2-user/app
            cd /home/ec2-user/app
            npm install --only=production
            export $(cat /home/ec2-user/.env | xargs)
            pm2 reload ecommerce-api --update-env || pm2 start dist/server.js --name ecommerce-api
            pm2 save

      - name: Upload build to S3
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set region ap-south-1
          cd apps/api
          aws s3 sync . s3://${{ secrets.DEPLOY_BUCKET }}/app --exclude "src/*" --exclude "*.test.*"