name: Deploy to AWS

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  AWS_REGION: ap-south-1
  NODE_VERSION: "18"

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Build API
        run: npm run build --workspace=apps/api
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost/fake"

      - name: Build Web
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_STRIPE_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}

  deploy-api:
    name: Deploy API to EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build API
        run: |
          cd apps/api
          npm install
          npm run build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost/fake"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Upload build to S3
        run: |
          cd apps/api
          aws s3 sync . s3://${{ secrets.DEPLOY_BUCKET }}/app \
            --exclude "src/*" \
            --exclude "*.test.*" \
            --exclude ".env*"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            mkdir -p /home/ec2-user/app
            aws s3 sync s3://${{ secrets.DEPLOY_BUCKET }}/app /home/ec2-user/app
            cd /home/ec2-user/app
            npm install --only=production
            pm2 reload ecommerce-api --update-env || pm2 start dist/server.js --name ecommerce-api
            pm2 save

  deploy-web:
    name: Deploy Web to S3
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Next.js
        run: |
          cd apps/web
          npm install
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_STRIPE_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Upload to S3
        run: |
          aws s3 sync apps/web/.next/static \
            s3://${{ secrets.ASSETS_BUCKET }}/_next/static \
            --cache-control "public,max-age=31536000,immutable"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"