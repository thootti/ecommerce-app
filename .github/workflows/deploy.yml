name: Deploy to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  NODE_VERSION: "18"

jobs:
  # ── CI ────────────────────────────────────────────────────────
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint API
        run: npm run lint --workspace=apps/api || true

      - name: Build API
        run: npm run build --workspace=apps/api
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost/fake"

      - name: Build Web
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_STRIPE_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}

  # ── Deploy API to EC2 ──────────────────────────────────────────
  deploy-api:
    name: Deploy API → EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build API
        run: |
          cd apps/api
          npm ci
          npm run build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost/fake"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package & upload to S3
        run: |
          cd apps/api
          zip -r ../../api-deployment.zip . \
            --exclude "*.test.*" \
            --exclude "src/*" \
            --exclude ".env*"
          cd ../..
          aws s3 cp api-deployment.zip \
            s3://${{ secrets.DEPLOY_BUCKET }}/api/${{ github.sha }}.zip

      - name: Deploy via CodeDeploy
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name ${{ secrets.CODEDEPLOY_APP }} \
            --deployment-group-name ${{ secrets.CODEDEPLOY_GROUP }} \
            --s3-location bucket=${{ secrets.DEPLOY_BUCKET }},key=api/${{ github.sha }}.zip,bundleType=zip \
            --query 'deploymentId' --output text)
          echo "Deployment ID: $DEPLOYMENT_ID"
          aws deploy wait deployment-successful --deployment-id $DEPLOYMENT_ID
          echo "API deployed successfully!"

  # ── Deploy Web to S3 + CloudFront ─────────────────────────────
  deploy-web:
    name: Deploy Web → S3/CloudFront
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build Next.js
        run: |
          cd apps/web
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_STRIPE_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 sync apps/web/.next/static \
            s3://${{ secrets.ASSETS_BUCKET }}/_next/static \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 sync apps/web/public \
            s3://${{ secrets.ASSETS_BUCKET }}/public \
            --cache-control "public,max-age=86400"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "Web deployed and CDN cache cleared!"
